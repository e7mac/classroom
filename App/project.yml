name: ClassroomMaestro
options:
  bundleIdPrefix: com.classroommaestro
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: YES

packages:
  ClassroomCore:
    path: ../Packages/ClassroomCore

targets:
  ClassroomMaestro:
    type: application
    supportedDestinations: [mac, iOS, iPad]
    deploymentTarget:
      macOS: "14.0"
      iOS: "17.0"
    sources:
      - path: ClassroomMaestro
    resources:
      - path: ClassroomMaestro/Resources
        optional: true
    dependencies:
      - package: ClassroomCore
        product: AppCore
      - package: ClassroomCore
        product: MusicTheory
      - package: ClassroomCore
        product: MusicRendering
      - package: ClassroomCore
        product: AudioInput
    info:
      path: ClassroomMaestro/Info.plist
      properties:
        CFBundleDisplayName: ClassroomMaestro
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSMicrophoneUsageDescription: "ClassroomMaestro listens to your acoustic piano to display the notes you play in real time."
        NSHighResolutionCapable: true
        ATSApplicationFontsPath: "."
        UIAppFonts:
          - Bravura.otf
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: ClassroomMaestro/ClassroomMaestro.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.usb: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.classroommaestro.app
        PRODUCT_NAME: ClassroomMaestro
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    scheme: {}
